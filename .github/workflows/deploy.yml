name: build-and-deploy

# CI/CD landing: build образа -> push в GHCR -> rolling update prime-shop_landing.

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Compute lowercase owner
        id: vars
        run: echo "owner_lc=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push landing image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ steps.vars.outputs.owner_lc }}/prime-shop-landing:latest
            ghcr.io/${{ steps.vars.outputs.owner_lc }}/prime-shop-landing:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Validate deploy secrets
        run: |
          missing=0
          for name in VPS_HOST VPS_USER PRIME_SHOP_SSH_KEY GHCR_USER GHCR_PAT; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing repository secret: $name"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "::error::Add deploy secrets in Settings → Secrets and variables → Actions (copy from prime-shop-frontend repo)."
            exit 1
          fi
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          PRIME_SHOP_SSH_KEY: ${{ secrets.PRIME_SHOP_SSH_KEY }}
          GHCR_USER: ${{ secrets.GHCR_USER }}
          GHCR_PAT: ${{ secrets.GHCR_PAT }}

      - name: Rolling update on VPS
        uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE: ghcr.io/${{ steps.vars.outputs.owner_lc }}/prime-shop-landing:${{ github.sha }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.PRIME_SHOP_SSH_KEY }}
          envs: IMAGE
          script: |
            set -e
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u "${{ secrets.GHCR_USER }}" --password-stdin
            docker service update \
              --image "$IMAGE" \
              --with-registry-auth \
              --update-order start-first \
              prime-shop_landing
            docker service ps prime-shop_landing --no-trunc | head -n 5
